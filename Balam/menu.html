<html>
  <head>
    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: #2d1b12;
      }

      .judul {
        color: white;
        text-align: center;
        padding: 20px;
        font-size: 28px;
        font-weight: bold;
        background: #3b2a21;
      }

      .menu {
        padding: 10px;
      }

      .menu button {
        width: 100%;
        padding: 15px;
        margin-bottom: 10px;
        border: none;
        border-radius: 10px;
        background: #d9b99b;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }

      .menu button:hover {
        background: #8b5e3c;
        color: white;
        transform: scale(1.03);
      }
    </style>
  </head>
