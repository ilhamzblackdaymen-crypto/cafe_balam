<!-- promo.html -->
<html>
  <head>
    <title>Promo Cafe</title>

    <style>
      body {
        margin: 0;
        padding: 30px;
        font-family: Arial;
        background: #f5f0e6;
      }

      h1 {
        text-align: center;
        color: #d2691e;
        margin-bottom: 40px;
      }

      .container {
        display: flex;
        justify-content: center;
        gap: 30px;
        flex-wrap: wrap;
      }

      .card {
        width: 250px;
        background: white;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);

        transition: 0.4s;
        cursor: pointer;
      }

      .card:hover {
        transform: translateY(-10px) scale(1.03);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      }

      .card img {
        width: 100%;
        height: 180px;
        object-fit: cover;

        transition: 0.4s;
      }

      .card:hover img {
        transform: scale(1.08);
      }

      .isi {
        padding: 20px;
        text-align: center;
      }

      .isi h2 {
        color: #5c3b28;
      }

      .diskon {
        color: #d2691e;
        font-size: 22px;
        font-weight: bold;
        margin: 15px 0;
      }

      .btn {
        background: #8b5e3c;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 15px;

        transition: 0.3s;
      }

      .btn:hover {
        background: #5c3b28;
        transform: scale(1.05);
      }
    </style>
  </head>

  <body>
    <h1>🔥 PROMO MINGGU INI 🔥</h1>

    <div class="container">
      <!-- PROMO 1 -->
      <div class="card">
        <img
          src="https://images.unsplash.com/photo-1509042239860-f550ce710b93"
        />

        <div class="isi">
          <h2>Buy 1 Get 1</h2>

          <p>Beli 1 Cappuccino gratis 1 lagi.</p>

          <div class="diskon">SPECIAL PROMO</div>

          <button class="btn">Ambil Promo</button>
        </div>
      </div>

      <!-- PROMO 2 -->
      <div class="card">
        <img
          src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085"
        />

        <div class="isi">
          <h2>Diskon Pelajar</h2>

          <p>Tunjukkan kartu pelajar dan dapatkan diskon.</p>

          <div class="diskon">DISKON 20%</div>

          <button class="btn">Ambil Promo</button>
        </div>
      </div>

      <!-- PROMO 3 -->
      <div class="card">
        <img
          src="https://images.unsplash.com/photo-1517701604599-bb29b565090c"
        />

        <div class="isi">
          <h2>Gratis Wifi</h2>

          <p>Nongkrong nyaman dengan internet cepat.</p>

          <div class="diskon">FREE WIFI</div>

          <button class="btn">Ambil Promo</button>
        </div>
      </div>
    </div>
  </body>
</html>
